name: Poll internships
on:
  schedule:
    - cron: '2,7,12,17,22,27,32,37,42,47,52,57 * * * *'
  workflow_dispatch:
concurrency:
  group: internship-poll
  cancel-in-progress: false
permissions:
  id-token: write
  contents: read
jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm }
      - run: npm ci
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
      - run: npx tsx src/cli.ts poll
        env:
          INTERNSHIPS_TABLE: ${{ vars.INTERNSHIPS_TABLE }}
          SMS_DESTINATION: ${{ secrets.SMS_DESTINATION }}
          SMS_ORIGINATION_NUMBER: ${{ secrets.SMS_ORIGINATION_NUMBER }}
