name: Poll internships
on:
  schedule:
    - cron: '2,7,12,17,22,27,32,37,42,47,52,57 * * * *'
  workflow_dispatch:
concurrency:
  group: internship-poll
  cancel-in-progress: false
permissions:
  id-token: write
  contents: read
jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm }
      - run: npm ci
      - name: Inspect OIDC claims (manual runs only)
        if: github.event_name == 'workflow_dispatch'
        run: |
          node -e 'const run = async () => { const response = await fetch(`${process.env.ACTIONS_ID_TOKEN_REQUEST_URL}&audience=sts.amazonaws.com`, { headers: { Authorization: `Bearer ${process.env.ACTIONS_ID_TOKEN_REQUEST_TOKEN}` } }); const { value } = await response.json(); const claims = JSON.parse(Buffer.from(value.split(".")[1], "base64url").toString()); console.log(JSON.stringify({ sub: claims.sub, aud: claims.aud })); }; run().catch((error) => { console.error(error); process.exit(1); });'
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
      - run: npx tsx src/cli.ts poll
        env:
          INTERNSHIPS_TABLE: ${{ vars.INTERNSHIPS_TABLE }}
          SMS_DESTINATION: ${{ secrets.SMS_DESTINATION }}
          SMS_ORIGINATION_NUMBER: ${{ secrets.SMS_ORIGINATION_NUMBER }}
