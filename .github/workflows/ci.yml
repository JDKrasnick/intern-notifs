name: CI
on: [push, pull_request]
permissions: { contents: read }
jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      source_pipeline: ${{ steps.filter.outputs.source_pipeline }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            source_pipeline:
              - 'src/sources/**'
              - 'src/core/markdown.ts'
              - 'scripts/source-quality.ts'
              - 'test/**sources**'
              - 'test/**quality**'
              - 'SOURCES.md'
              - 'EMPLOYERS.json'
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm }
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
  live-source-quality:
    needs: changes
    if: needs.changes.outputs.source_pipeline == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm }
      - run: npm ci
      - run: npm run source:quality -- --output artifacts/source-quality.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: source-quality-report
          path: artifacts/source-quality.json
          if-no-files-found: warn
  verify-mobile:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm, cache-dependency-path: mobile/package-lock.json }
      - run: npm ci
      - run: npm run typecheck
      - run: npx expo config --type public
