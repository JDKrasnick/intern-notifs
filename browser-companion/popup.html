<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>InternNotifs Quick Fill</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main>
      <p class="eyebrow">InternNotifs</p>
      <h1>Quick fill</h1>
      <p class="intro">Save only the contact details you want to reuse. They stay in this browser and are never submitted for you.</p>
      <form id="profile-form">
        <label>First name<input id="firstName" autocomplete="given-name" type="text"></label>
        <label>Last name<input id="lastName" autocomplete="family-name" type="text"></label>
        <label>Email<input id="email" autocomplete="email" type="email" required></label>
        <label>Phone<input id="phone" autocomplete="tel" type="tel"></label>
        <label class="toggle"><input id="advance" type="checkbox" checked><span>Advance after a completed field</span></label>
        <button type="submit">Save contact details</button>
        <p id="status" role="status" aria-live="polite"></p>
      </form>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
